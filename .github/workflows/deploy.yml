name: Deploy to Earth Drilling

on:
  push:
    branches: [master, main]
    paths:
      - 'plugins/**'
      - 'themes/**'
      - 'mu-plugins/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          log-public-key: false

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.167.35.242 >> ~/.ssh/known_hosts

      - name: Deploy plugins
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            plugins/country-redirect/ \
            cameron@72.167.35.242:/var/www/earthdrilling.com/public/wp-content/plugins/earthdrilling-country-redirect/
          echo "✓ Root plugin deployed"

      - name: Deploy CA theme
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            --exclude='build/' --exclude='node_modules/' --exclude='dist/' \
            themes/earthdrilling/ \
            cameron@72.167.35.242:/var/www/earthdrilling.com/ca/public/wp-content/themes/earthdrilling/
          echo "✓ CA theme deployed"

      - name: Deploy US theme
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            --exclude='build/' --exclude='node_modules/' --exclude='dist/' \
            themes/harrisexploration/ \
            cameron@72.167.35.242:/var/www/earthdrilling.com/us/public/wp-content/themes/harrisexploration/
          echo "✓ US theme deployed"

      - name: Deploy mu-plugins (CA)
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            mu-plugins/ca/ \
            cameron@72.167.35.242:/var/www/earthdrilling.com/ca/public/wp-content/mu-plugins/
          echo "✓ CA mu-plugins deployed"

      - name: Deploy mu-plugins (US)
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            mu-plugins/us/ \
            cameron@72.167.35.242:/var/www/earthdrilling.com/us/public/wp-content/mu-plugins/
          echo "✓ US mu-plugins deployed"

      - name: Clear caches (CA)
        run: |
          ssh cameron@72.167.35.242 'cd /var/www/earthdrilling.com/ca/public && wp cache flush --allow-root && wp litespeed-purge all --allow-root 2>/dev/null; echo "CA cache cleared"'

      - name: Clear caches (US)
        run: |
          ssh cameron@72.167.35.242 'cd /var/www/earthdrilling.com/us/public && wp cache flush --allow-root && wp litespeed-purge all --allow-root 2>/dev/null; echo "US cache cleared"'

      - name: Clear caches (Root)
        run: |
          ssh cameron@72.167.35.242 'cd /var/www/earthdrilling.com/public && wp cache flush --allow-root && wp litespeed-purge all --allow-root 2>/dev/null; echo "Root cache cleared"'

      - name: Reset OPcache
        run: |
          ssh cameron@72.167.35.242 'for site in ca/public us/public public; do cat > /var/www/earthdrilling.com/$site/opcache-rst.php << "PHPEOF"
<?php opcache_reset(); echo "ok";
PHPEOF
            curl -sk "https://earthdrilling.com/${site%public}opcache-rst.php" 2>/dev/null || true
            rm -f /var/www/earthdrilling.com/$site/opcache-rst.php
          done'
          echo "✓ OPcache reset on all 3 sites"

      - name: Verify deployment
        run: |
          for url in https://earthdrilling.com/ https://earthdrilling.com/ca/ https://earthdrilling.com/us/; do
            code=$(curl -sko /dev/null -w "%{http_code}" "$url")
            echo "$url → HTTP $code"
          done
          echo "✓ All done"
